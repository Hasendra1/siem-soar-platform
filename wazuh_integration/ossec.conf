<ossec_config>

  <!-- ================================================================== -->
  <!-- Agent identification                                                -->
  <!-- ================================================================== -->
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>iot-ot-agent</config-profile>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
  </client>

  <!-- ================================================================== -->
  <!-- Log monitoring - Modbus traffic                                     -->
  <!-- ================================================================== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/modbus.log</location>
  </localfile>

  <!-- ================================================================== -->
  <!-- Log monitoring - MQTT traffic                                       -->
  <!-- ================================================================== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/mqtt.log</location>
  </localfile>

  <!-- ================================================================== -->
  <!-- Log monitoring - System events                                      -->
  <!-- ================================================================== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- ================================================================== -->
  <!-- Log monitoring - Application logs                                   -->
  <!-- ================================================================== -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/app.log</location>
  </localfile>

  <!-- ================================================================== -->
  <!-- Custom alert rules for IoT/OT threat detection                      -->
  <!-- ================================================================== -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/ossec/logs/alerts/alerts.json</location>
  </localfile>

  <!-- ================================================================== -->
  <!-- File integrity monitoring (syscheck)                                -->
  <!-- ================================================================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor critical configuration and application directories -->
    <directories check_all="yes" realtime="yes">/var/ossec/etc</directories>
    <directories check_all="yes" realtime="yes">/opt/python</directories>
    <directories check_all="yes" realtime="yes">/app</directories>

    <!-- Ignore frequently-changing files -->
    <ignore>/var/ossec/logs</ignore>
    <ignore>/var/ossec/queue</ignore>
    <ignore>/var/ossec/stats</ignore>
  </syscheck>

  <!-- ================================================================== -->
  <!-- Rootcheck - Rootkit detection                                       -->
  <!-- ================================================================== -->
  <rootcheck>
    <disabled>no</disabled>
    <frequency>3600</frequency>
  </rootcheck>

  <!-- ================================================================== -->
  <!-- Active response - auto-block on critical alerts                     -->
  <!-- ================================================================== -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- ================================================================== -->
  <!-- Logging configuration                                               -->
  <!-- ================================================================== -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
